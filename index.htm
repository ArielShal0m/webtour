    <style type="text/css">
        html,
        body {
            height: 100%;
            width: 100%;
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .fill-viewport {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        .fill-viewport.landscape-left {
            left: env(safe-area-inset-left);
        }

        .fill-viewport.landscape-right {
            right: env(safe-area-inset-right);
        }

        #viewer {
            z-index: 1;
        }

        #preloadContainer {
            z-index: 2;
            opacity: 0;
            background-color: rgba(255, 255, 255, 1);
            transition: opacity 0.5s;
            -webkit-transition: opacity 0.5s;
            -moz-transition: opacity 0.5s;
            -o-transition: opacity 0.5s;
        }

        /* Botão Tela Cheia - compatível com VR */
        #fullscreenBtn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            width: 64px;
            height: 64px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            background-color: rgba(0, 0, 0, 0.6);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        #fullscreenBtn svg {
            width: 32px;
            height: 32px;
            fill: #ffffff;
            pointer-events: none;
        }

        #fullscreenBtn .icon-exit {
            display: none;
        }

        #fullscreenBtn.is-fullscreen .icon-enter {
            display: none;
        }

        #fullscreenBtn.is-fullscreen .icon-exit {
            display: block;
        }

        /* Hover apenas em dispositivos que suportam (não VR) */
        @media (hover: hover) {
            #fullscreenBtn:hover {
                background-color: rgba(0, 0, 0, 0.8);
                border-color: rgba(255, 255, 255, 0.7);
                transform: scale(1.1);
            }
        }

        #fullscreenBtn:active {
            transform: scale(0.92);
            background-color: rgba(0, 0, 0, 0.85);
        }

        /* Esconde botão se fullscreen não for suportado */
        #fullscreenBtn.fs-unsupported {
            display: none;
        }
    </style>

</head>

<body>
    <div id="preloadContainer" class="fill-viewport">
        <div
            style="z-index: 4; position: absolute; overflow: hidden; left: 0%; top: 50%; width: 100.00%; height: 10.00%">
            <div style="text-align:left; color:#000; ">
                <DIV STYLE="text-align:center;font-size:1.6666666666666663vmin;"><SPAN
                        STYLE="display:inline-block; letter-spacing:0vmin; white-space:pre-wrap;color:#777777;font-size:1.67vmin;font-family:Arial, Helvetica, sans-serif;">Loading
                        virtual tour. Please wait...</SPAN></DIV>
                <DIV STYLE="text-align:center;font-size:1.6666666666666663vmin;"><SPAN
                        STYLE="display:inline-block; letter-spacing:0vmin; white-space:pre-wrap;color:#777777;font-size:1.67vmin;font-family:Arial, Helvetica, sans-serif;">created
                        with the trial of 3DVista VT Pro</SPAN></DIV>
                <DIV STYLE="text-align:center;font-size:1.4814814814814814vmin;"><A TARGET="_blank"
                        HREF="https://www.3dvista.com" STYLE="text-decoration:none; color:inherit;"><SPAN
                            STYLE="display:inline-block; letter-spacing:0vmin; white-space:pre-wrap;color:#999999;font-size:1.48vmin;font-family:Arial, Helvetica, sans-serif;"><U>www.3DVista.com</U></SPAN></A>
                </DIV>
            </div>
        </div>
    </div>
    <div id="viewer" class="fill-viewport"></div>

    <!-- Botão Tela Cheia -->
    <button id="fullscreenBtn" title="Tela Cheia" aria-label="Alternar tela cheia">
        <!-- Ícone Entrar em Tela Cheia -->
        <svg class="icon-enter" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 3h7V1H1v9h2V3zm11-2v2h7v7h2V1h-9zM3 14H1v9h9v-2H3v-7zm18 0h-2v7h-7v2h9v-9z" />
        </svg>
        <!-- Ícone Sair da Tela Cheia -->
        <svg class="icon-exit" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M9 1v8H1v2h9a1 1 0 001-1V1H9zm6 0v9a1 1 0 001 1h8v-2h-7V1h-2zM1 14h8v8h2v-9a1 1 0 00-1-1H1v2zm14-1v9h2v-8h7v-2h-8a1 1 0 00-1 1z" />
        </svg>
    </button>

    <script>
        (function () {
            var btn = document.getElementById('fullscreenBtn');
            var docEl = document.documentElement;

            // Detecta suporte a fullscreen
            var fsEnabled = document.fullscreenEnabled
                || document.webkitFullscreenEnabled
                || document.mozFullScreenEnabled
                || document.msFullscreenEnabled;

            // Se fullscreen não é suportado (ex: Wolvic VR), esconde o botão
            if (!fsEnabled) {
                btn.classList.add('fs-unsupported');
                return;
            }

            function getFullscreenElement() {
                return document.fullscreenElement
                    || document.webkitFullscreenElement
                    || document.mozFullScreenElement
                    || document.msFullscreenElement;
            }

            function enterFullscreen() {
                if (docEl.requestFullscreen) docEl.requestFullscreen();
                else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
                else if (docEl.mozRequestFullScreen) docEl.mozRequestFullScreen();
                else if (docEl.msRequestFullscreen) docEl.msRequestFullscreen();
            }

            function exitFullscreen() {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
                else if (document.msExitFullscreen) document.msExitFullscreen();
            }

            btn.addEventListener('click', function (e) {
                e.preventDefault();
                e.stopPropagation();
                if (!getFullscreenElement()) {
                    enterFullscreen();
                } else {
                    exitFullscreen();
                }
            });

            // Eventos touch para melhor responsividade em VR
            btn.addEventListener('touchend', function (e) {
                e.preventDefault();
                e.stopPropagation();
                if (!getFullscreenElement()) {
                    enterFullscreen();
                } else {
                    exitFullscreen();
                }
            }, { passive: false });

            function onFSChange() {
                if (getFullscreenElement()) {
                    btn.classList.add('is-fullscreen');
                } else {
                    btn.classList.remove('is-fullscreen');
                }
            }

            document.addEventListener('fullscreenchange', onFSChange);
            document.addEventListener('webkitfullscreenchange', onFSChange);
            document.addEventListener('mozfullscreenchange', onFSChange);
            document.addEventListener('MSFullscreenChange', onFSChange);
        })();
    </script>
</body>
