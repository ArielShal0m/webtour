    <style type="text/css">
        html,
        body {
            height: 100%;
            width: 100%;
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .fill-viewport {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        .fill-viewport.landscape-left {
            left: env(safe-area-inset-left);
        }

        .fill-viewport.landscape-right {
            right: env(safe-area-inset-right);
        }

        #viewer {
            z-index: 1;
        }

        #preloadContainer {
            z-index: 2;
            opacity: 0;
            background-color: rgba(255, 255, 255, 1);
            transition: opacity 0.5s;
            -webkit-transition: opacity 0.5s;
            -moz-transition: opacity 0.5s;
            -o-transition: opacity 0.5s;
        }

        /* Botão Tela Cheia / Modo Imersivo */
        #fullscreenBtn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 2147483647;
            width: 64px;
            height: 64px;
            min-width: 64px;
            min-height: 64px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            background-color: rgba(0, 0, 0, 0.6);
            cursor: pointer;
            display: flex !important;
            visibility: visible !important;
            opacity: 1 !important;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s ease, transform 0.2s ease;
            /* Força camada própria para aparecer acima do canvas em Wolvic/Pico */
            transform: translateZ(9999px);
            -webkit-transform: translateZ(9999px);
            will-change: transform;
            pointer-events: auto !important;
        }

        #fullscreenBtn svg {
            width: 32px;
            height: 32px;
            fill: #ffffff;
            pointer-events: none;
        }

        /* Estado: normal (entrar) */
        #fullscreenBtn .icon-exit {
            display: none;
        }

        /* Estado: ativo (sair) */
        #fullscreenBtn.is-active .icon-enter {
            display: none;
        }

        #fullscreenBtn.is-active .icon-exit {
            display: block;
        }

        /* Hover apenas em dispositivos que suportam */
        @media (hover: hover) {
            #fullscreenBtn:hover {
                background-color: rgba(0, 0, 0, 0.8);
                border-color: rgba(255, 255, 255, 0.7);
                transform: translateZ(9999px) scale(1.1);
                -webkit-transform: translateZ(9999px) scale(1.1);
            }
        }

        #fullscreenBtn:active {
            transform: translateZ(9999px) scale(0.92);
            -webkit-transform: translateZ(9999px) scale(0.92);
            background-color: rgba(0, 0, 0, 0.85);
        }

        /* Wolvic/Pico: garante que o botão apareça mesmo com viewport VR */
        @media (pointer: coarse) {
            #fullscreenBtn {
                bottom: 20px;
                right: 20px;
            }
        }

        /* Modo UI limpa - esconde elementos de interface */
        body.clean-ui #preloadContainer,
        body.clean-ui .tdv-hotspot-label,
        body.clean-ui .tdv-container>div:not(#viewer):not(#fullscreenBtn) {
            opacity: 0 !important;
            pointer-events: none !important;
            transition: opacity 0.3s ease;
        }

        /* Root do DOM Overlay WebXR – visível só dentro da sessão VR */
        #xr-overlay-root {
            position: fixed;
            inset: 0;
            pointer-events: none;
            visibility: hidden;
            z-index: 2147483647;
        }

        #xr-overlay-root.active {
            visibility: visible;
            pointer-events: auto;
        }

        #xr-overlay-root .xr-exit-btn {
            position: absolute;
            bottom: 28px;
            right: 28px;
            width: 72px;
            height: 72px;
            min-width: 72px;
            min-height: 72px;
            border: 3px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            pointer-events: auto;
            touch-action: manipulation;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
        }

        #xr-overlay-root .xr-exit-btn:active {
            transform: scale(0.95);
        }

        /* Dica em 2D para sair do VR quando não houver DOM Overlay (ex.: Wolvic) */
        .vr-exit-hint {
            position: fixed;
            bottom: 92px;
            right: 24px;
            z-index: 2147483646;
            max-width: 200px;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.75);
            color: rgba(255, 255, 255, 0.95);
            font-size: 12px;
            line-height: 1.3;
            pointer-events: none;
            visibility: hidden;
        }

        html.is-vr .vr-exit-hint {
            visibility: visible;
        }
    </style>

<body>
    <div id="preloadContainer" class="fill-viewport">

                            STYLE="display:inline-block; letter-spacing:0vmin; white-space:pre-wrap;color:#999999;font-size:1.48vmin;font-family:Arial, Helvetica, sans-serif;"><U>www.3DVista.com</U></SPAN></A>

    <div id="viewer" class="fill-viewport"></div>

    <!-- Root para WebXR DOM Overlay (botão visível no VR estereoscópico) -->
    <div id="xr-overlay-root">
        <button type="button" class="xr-exit-btn" id="xrExitBtn" aria-label="Sair do VR">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M9 1v8H1v2h9a1 1 0 001-1V1H9zm6 0v9a1 1 0 001 1h8v-2h-7V1h-2zM1 14h8v8h2v-9a1 1 0 00-1-1H1v2zm14-1v9h2v-8h7v-2h-8a1 1 0 00-1 1z"/></svg>
            <span>Sair VR</span>
        </button>
    </div>

    <p class="vr-exit-hint" id="vrExitHint" aria-hidden="true">Para sair do VR use o botão voltar do controle.</p>

    <!-- Botão Tela Cheia / Modo Imersivo -->
    <button id="fullscreenBtn" title="Tela Cheia" aria-label="Alternar tela cheia">
        <!-- Ícone Entrar -->
        <svg class="icon-enter" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 3h7V1H1v9h2V3zm11-2v2h7v7h2V1h-9zM3 14H1v9h9v-2H3v-7zm18 0h-2v7h-7v2h9v-9z" />
        </svg>
        <!-- Ícone Sair -->
        <svg class="icon-exit" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M9 1v8H1v2h9a1 1 0 001-1V1H9zm6 0v9a1 1 0 001 1h8v-2h-7V1h-2zM1 14h8v8h2v-9a1 1 0 00-1-1H1v2zm14-1v9h2v-8h7v-2h-8a1 1 0 00-1 1z" />
        </svg>
    </button>

    <script>
        (function () {
            var btn = document.getElementById('fullscreenBtn');
            var docEl = document.documentElement;
            var isCleanUI = false;

            // =============================================
            // DETECÇÃO DE NAVEGADOR VR / WOLVIC (PICO)
            // =============================================
            function isVRBrowser() {
                return !!(
                    navigator.xr ||
                    /VR|Oculus|Quest|Pico|Wolvic/i.test(navigator.userAgent)
                );
            }

            function isWolvic() {
                return /Wolvic|Pico.*Browser/i.test(navigator.userAgent);
            }

            // Marca html para dica "Sair VR" (botão fica fora do #viewer para não quebrar o 3DVista)
            if (isVRBrowser()) {
                document.documentElement.classList.add('is-vr');
            }

            // Garantir que o botão fique visível no Wolvic/Pico (por cima do canvas)
            function forceFullscreenBtnVisible() {
                if (!btn) return;
                btn.style.visibility = 'visible';
                btn.style.opacity = '1';
                btn.style.display = 'flex';
                btn.style.zIndex = '2147483647';
                btn.style.pointerEvents = 'auto';
            }
            if (isWolvic()) {
                forceFullscreenBtnVisible();
                // Reaplicar após o player 3DVista montar (pode sobrescrever estilos)
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', forceFullscreenBtnVisible);
                }
                setTimeout(forceFullscreenBtnVisible, 500);
                setTimeout(forceFullscreenBtnVisible, 2000);
            }

            // =============================================
            // SUPORTE A FULLSCREEN
            // =============================================
            var fsEnabled = !!(
                document.fullscreenEnabled ||
                document.webkitFullscreenEnabled ||
                document.mozFullScreenEnabled ||
                document.msFullscreenEnabled
            );

            function getFullscreenElement() {
                return document.fullscreenElement
                    || document.webkitFullscreenElement
                    || document.mozFullScreenElement
                    || document.msFullscreenElement;
            }

            function enterFullscreen() {
                if (docEl.requestFullscreen) docEl.requestFullscreen();
                else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
                else if (docEl.mozRequestFullScreen) docEl.mozRequestFullScreen();
                else if (docEl.msRequestFullscreen) docEl.msRequestFullscreen();
            }

            function exitFullscreen() {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
                else if (document.msExitFullscreen) document.msExitFullscreen();
            }

            // =============================================
            // TOGGLE UI LIMPA (FALLBACK VR)
            // =============================================
            function toggleUI() {
                isCleanUI = !isCleanUI;
                document.body.classList.toggle('clean-ui', isCleanUI);
                btn.classList.toggle('is-active', isCleanUI);
            }

            // =============================================
            // WEBXR (SESSÃO IMERSIVA VR) + DOM OVERLAY
            // =============================================
            var xrSession = null;
            var xrOverlayRoot = document.getElementById('xr-overlay-root');
            var xrExitBtn = document.getElementById('xrExitBtn');

            function onXRSessionEnded() {
                xrSession = null;
                btn.classList.remove('is-active');
                if (xrOverlayRoot) xrOverlayRoot.classList.remove('active');
            }

            function tryWebXR() {
                if (!navigator.xr) return false;

                navigator.xr.isSessionSupported('immersive-vr').then(function (supported) {
                    if (supported && !xrSession) {
                        var options = { optionalFeatures: ['dom-overlay'] };
                        if (xrOverlayRoot) options.domOverlay = { root: xrOverlayRoot };

                        navigator.xr.requestSession('immersive-vr', options).then(function (session) {
                            xrSession = session;
                            btn.classList.add('is-active');
                            if (xrOverlayRoot) xrOverlayRoot.classList.add('active');

                            if (xrExitBtn) {
                                xrExitBtn.onclick = function () {
                                    if (xrSession) xrSession.end();
                                };
                            }

                            session.addEventListener('end', onXRSessionEnded);
                        }).catch(function () {
                            onXRSessionEnded();
                            toggleUI();
                        });
                    } else if (xrSession) {
                        xrSession.end();
                    } else {
                        toggleUI();
                    }
                }).catch(function () {
                    toggleUI();
                });

                return true;
            }

            // =============================================
            // LÓGICA PRINCIPAL DO BOTÃO
            // =============================================
            function handleClick(e) {
                e.preventDefault();
                e.stopPropagation();

                // 1) Em navegador VR (Wolvic/Pico): priorizar modo imersivo VR (WebXR), não fullscreen 2D
                if (isVRBrowser() && navigator.xr) {
                    if (tryWebXR()) return;
                }

                // 2) Desktop / Mobile (não VR): Fullscreen API
                if (fsEnabled) {
                    if (!getFullscreenElement()) {
                        enterFullscreen();
                    } else {
                        exitFullscreen();
                    }
                    return;
                }

                // 4) Fallback: toggle UI limpa
                toggleUI();
            }

            // Click handler
            btn.addEventListener('click', handleClick);

            // Touch handler para melhor responsividade em VR
            var touchHandled = false;
            btn.addEventListener('touchend', function (e) {
                e.preventDefault();
                e.stopPropagation();
                touchHandled = true;
                handleClick(e);
                // Previne o click duplicado
                setTimeout(function () { touchHandled = false; }, 300);
            }, { passive: false });

            // Previne click duplicado após touch
            btn.addEventListener('click', function (e) {
                if (touchHandled) {
                    e.preventDefault();
                    e.stopPropagation();
                }
            }, true);

            // =============================================
            // FULLSCREEN CHANGE LISTENER
            // =============================================
            function onFSChange() {
                if (getFullscreenElement()) {
                    btn.classList.add('is-active');
                } else {
                    btn.classList.remove('is-active');
                }
            }

            document.addEventListener('fullscreenchange', onFSChange);
            document.addEventListener('webkitfullscreenchange', onFSChange);
            document.addEventListener('mozfullscreenchange', onFSChange);
            document.addEventListener('MSFullscreenChange', onFSChange);

            // =============================================
            // NUNCA ESCONDER O BOTÃO
            // O botão SEMPRE fica visível em qualquer navegador.
            // Em VR ele age como toggle de UI limpa.
            // Em desktop/mobile ele age como fullscreen.
            // =============================================

        })();
    </script>
